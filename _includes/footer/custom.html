<script>
  // Inject a "Copy" button into every Rouge code block.
  document.addEventListener('DOMContentLoaded', function () {
    document.querySelectorAll('.highlighter-rouge').forEach(function (wrapper) {
      var pre = wrapper.querySelector('pre.highlight') || wrapper.querySelector('pre');
      if (!pre) return;
      if (wrapper.querySelector('.copy-btn')) return;

      var iconCopy = '<i class="far fa-copy" aria-hidden="true"></i>';
      var iconDone = '<i class="fas fa-clipboard-check" aria-hidden="true"></i>';

      var btn = document.createElement('button');
      btn.className = 'copy-btn';
      btn.type = 'button';
      btn.setAttribute('aria-label', 'Copy code to clipboard');
      btn.setAttribute('title', 'Copy');
      btn.innerHTML = iconCopy;

      btn.addEventListener('click', function () {
        var codeEl = pre.querySelector('code') || pre;
        var text = codeEl.innerText.replace(/\n$/, '');
        navigator.clipboard.writeText(text).then(function () {
          btn.innerHTML = iconDone;
          btn.setAttribute('title', 'Copied!');
          btn.classList.add('is-copied');
          setTimeout(function () {
            btn.innerHTML = iconCopy;
            btn.setAttribute('title', 'Copy');
            btn.classList.remove('is-copied');
          }, 1500);
        }).catch(function () {
          btn.setAttribute('title', 'Error');
          setTimeout(function () { btn.setAttribute('title', 'Copy'); }, 1500);
        });
      });

      wrapper.style.position = 'relative';
      wrapper.appendChild(btn);
    });
  });
</script>

<!-- end custom footer snippets -->
